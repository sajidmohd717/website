<!DOCTYPE html>
<html>
<head>
  <title>Financial Report</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    .nav { margin-bottom: 20px; }
    .nav a { margin: 0 10px; text-decoration: none; color: #00796b; font-weight: bold; }
    .stats { display: flex; justify-content: space-around; margin: 20px 0; }
    .card { padding: 20px; border-radius: 10px; width: 28%; color: white; font-weight: bold; font-size: 20px; }
    .sales-card { background: #2e7d32; }
    .buy-card { background: #c62828; }
    .profit-card { background: #1565c0; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    th { background: #eee; }
  </style>
</head>
<body>
<div class="container">
  <h2>📈 Pharmacy Profit & Loss</h2>
  <div class="nav">
    <a href="index.html">Sales</a> | <a href="buy.html">Buy (Supplier)</a> | <a href="inventory.html">Inventory</a>
  </div>

  <div class="stats">
    <div class="card sales-card" id="sTotal">Revenue: $0</div>
    <div class="card buy-card" id="bTotal">Expenses: $0</div>
    <div class="card profit-card" id="pTotal">Net Profit: $0</div>
  </div>

  <h3>Recent Sales</h3>
  <table id="salesTable">
    <thead><tr><th>Time</th><th>Customer</th><th>Item</th><th>Qty</th><th>Total</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
  const sales = JSON.parse(localStorage.getItem("sales")) || [];
  const purchases = JSON.parse(localStorage.getItem("purchases")) || [];

  let totalSales = 0;
  let totalSpent = 0;

  const sBody = document.querySelector("#salesTable tbody");
  sales.reverse().forEach(s => {
    totalSales += s.total;
    sBody.innerHTML += `<tr><td>${s.time}</td><td>${s.customer}</td><td>${s.name}</td><td>${s.qty}</td><td>$${s.total.toFixed(2)}</td></tr>`;
  });

  purchases.forEach(p => totalSpent += p.total);

  document.getElementById("sTotal").innerText = "Revenue: $" + totalSales.toFixed(2);
  document.getElementById("bTotal").innerText = "Expenses: $" + totalSpent.toFixed(2);
  document.getElementById("pTotal").innerText = "Net Profit: $" + (totalSales - totalSpent).toFixed(2);
</script>
</body>
</html>
