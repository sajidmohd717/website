<!DOCTYPE html>
<html>
<head>
  <title>Pharmacy Inventory</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #004d40; color: white; }
    .low-stock { color: red; font-weight: bold; }
    .nav { margin-bottom: 20px; text-align: center; }
    .nav a { margin: 0 10px; text-decoration: none; color: #00796b; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <h2 style="text-align: center;">📦 Current Inventory</h2>
  <div class="nav">
    <a href="index.html">Sales</a> | <a href="buy.html">Buy (Supplier)</a> | <a href="report.html">Report</a>
  </div>
  <table>
    <thead><tr><th>Code</th><th>Medication</th><th>In Stock</th></tr></thead>
    <tbody id="invTable"></tbody>
  </table>
</div>

<script>
const items = {
  "M001": "Acmecilin", "M002": "Paracetamol", "M003": "Amoxicillin",
  "M004": "Cetirizine", "M005": "Ibuprofen", "M006": "Gaviscon"
};
const inventory = JSON.parse(localStorage.getItem("inventory")) || {};
const tbody = document.getElementById("invTable");

for (let code in items) {
  const qty = inventory[code] || 0;
  tbody.innerHTML += `<tr>
    <td>${code}</td>
    <td>${items[code]}</td>
    <td class="${qty < 10 ? 'low-stock' : ''}">${qty} units</td>
  </tr>`;
}
</script>
</body>
</html>
