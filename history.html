    .txn-items td { padding: 8px 16px; border-bottom: 1px solid #f0f0f0; }
    .txn-items tr:last-child td { border-bottom: none; }
    .txn-items th { padding: 7px 16px; background: #f1f8f7; color: #555; text-align: left; font-size: 12px; font-weight: 600; }

// ── Helpers ───────────────────────────────────────────────────────────────────

function groupBy(arr, keyFn) {
  const map = new Map();
  arr.forEach(item => {
    const k = keyFn(item);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(item);
  });
  return Array.from(map.values());
}

function toggleItems(id) {
  document.getElementById(id).classList.toggle("collapse");
}

function switchTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  btn.classList.add("active");
}

// ── Render Sales ──────────────────────────────────────────────────────────────

function renderSales() {
  const sales = JSON.parse(localStorage.getItem("sales")) || [];
  const q = document.getElementById("sales-filter").value.toLowerCase();
  const groups = groupBy(sales, s => s.customer + "|" + s.time);
  const filtered = groups.filter(g =>
    !q || g.some(s => s.customer.toLowerCase().includes(q) || s.name.toLowerCase().includes(q))
  ).reverse();

  const container = document.getElementById("sales-list");
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">No sales records found</div>`;
  } else {
    container.innerHTML = filtered.map((g, i) => {
      const groupTotal = g.reduce((sum, s) => sum + s.total, 0);
      const totalQty   = g.reduce((sum, s) => sum + s.qty, 0);
      const rows = g.map(s => `
        <tr>
          <td>${s.name}</td>
          <td style="color:#777">${s.strength || "—"}</td>
          <td>${s.qty} units</td>
          <td>৳${s.price.toFixed(2)}</td>
          <td><strong>৳${s.total.toFixed(2)}</strong></td>
        </tr>`).join("");
      return `
        <div class="txn-card">
          <div class="txn-header" onclick="toggleItems('s-items-${i}')">
            <div>
              <div class="txn-title">👤 ${g[0].customer}</div>
              <div class="txn-meta">${g[0].time} &nbsp;·&nbsp; ${g.length} medication${g.length > 1 ? "s" : ""} &nbsp;·&nbsp; ${totalQty} units total</div>
            </div>
            <div class="txn-total">৳${groupTotal.toFixed(2)}</div>
          </div>
          <div class="txn-items" id="s-items-${i}">
            <table>
              <thead><tr><th>Medication</th><th>Strength</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }).join("");
  }

  const totalRev   = sales.reduce((sum, s) => sum + s.total, 0);
  const totalUnits = sales.reduce((sum, s) => sum + s.qty, 0);
  const txnCount   = groupBy(sales, s => s.customer + "|" + s.time).length;
  document.getElementById("s-revenue").innerText = "৳" + totalRev.toFixed(2);
  document.getElementById("s-count").innerText   = txnCount;
  document.getElementById("s-units").innerText   = totalUnits;
}

// ── Render Purchases ──────────────────────────────────────────────────────────

              <tbody>${rows}</tbody>

    }).join("");

  document.getElementById("p-count").innerText  = orderCount;

}
